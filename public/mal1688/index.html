    <script type="text/babel">

          const [activeTab, setActiveTab] = React.useState('all');
          const [selectedLeader, setSelectedLeader] = React.useState(null);
          const [mobileMenuOpen, setMobileMenuOpen] = React.useState(false);
          const [academyTab, setAcademyTab] = React.useState('manifesto');
          const [selectedEmotion, setSelectedEmotion] = React.useState('growth');
          const [flippedObjection, setFlippedObjection] = React.useState(null);

          // 科學實證模擬變量：優質原料與協同因子對吸收與發育的正面影響
          const [nutritionSynergy, setNutritionSynergy] = React.useState(60); // 營養協同活性
          const [quadCalcium, setQuadCalcium] = React.useState(50);         // 四重複合鈣源輸入
          const [vitD3K2, setVitD3K2] = React.useState(50);                 // D3+K2 導航因子
          const [flavorAcceptance, setFlavorAcceptance] = React.useState(true); // 水果風味依從性
          
          const [absorptionRate, setAbsorptionRate] = React.useState(50);
          const [boneDensityRate, setBoneDensityRate] = React.useState(50);
          const [comfortRatio, setComfortRatio] = React.useState(90);

          React.useEffect(() => {
            const isSynergyIgnited = nutritionSynergy > 45;
            const rawAbsorb = (quadCalcium * 0.5) + (vitD3K2 * 0.5);
            const finalAbsorb = isSynergyIgnited ? Math.min(95, rawAbsorb * 1.2 + 10) : rawAbsorb * 0.6;
            setAbsorptionRate(Math.round(finalAbsorb));
            
            const finalBone = Math.round((finalAbsorb * 0.7) + (vitD3K2 * 0.3) + (flavorAcceptance ? 5 : 0));
            setBoneDensityRate(Math.min(100, finalBone));
            
            let baseComfort = 70;
            baseComfort += (quadCalcium / 100) * 20 + (flavorAcceptance ? 10 : 0);
            setComfortRatio(Math.min(100, baseComfort));
          }, [nutritionSynergy, quadCalcium, vitD3K2, flavorAcceptance]);

          React.useEffect(() => {
            if (window.lucide) lucide.createIcons();
          }, [activeTab, academyTab, selectedEmotion, flippedObjection, selectedLeader]);

            {

              category: 'exec',

              name: 'Prof. Marcus Vance',

                    <a href="#oem-process" className="text-sm font-semibold text-slate-600 hover:text-emerald-600 transition-colors">專業生產製程</a>

                      <h1 className="text-4xl sm:text-5xl lg:text-5xl xl:text-6xl font-black tracking-tight leading-tight text-slate-900">
                        補鈣，吸收重於含量！<br />
                        <span className="bg-gradient-to-r from-emerald-600 via-teal-500 to-cyan-600 bg-clip-text text-transparent">

                    </div>
                  </div>

                      </div>

                      <div className="space-y-2">
                        <div className="flex justify-between text-xs">
                          <span className="font-bold text-slate-700 flex items-center gap-1.5">四重複合鈣源配比</span>
                          <span className="font-bold text-emerald-600">{quadCalcium}%</span>
                        </div>
                        <input 
                          type="range" min="0" max="100" value={quadCalcium}
                          onChange={(e) => setQuadCalcium(Number(e.target.value))}
                          className="w-full accent-emerald-500 bg-slate-200 rounded-lg appearance-none h-2 cursor-pointer"
                        />
                      </div>

                      <div className="space-y-2">
                        <div className="flex justify-between text-xs">
                          <span className="font-bold text-slate-700 flex items-center gap-1.5">維生素 D3 × K2 導航配比</span>
                          <span className="font-bold text-cyan-600">{vitD3K2}%</span>
                        </div>
                        <input 
                          type="range" min="0" max="100" value={vitD3K2}
                          onChange={(e) => setVitD3K2(Number(e.target.value))}
                          className="w-full accent-cyan-500 bg-slate-200 rounded-lg appearance-none h-2 cursor-pointer"
                        />
                      </div>

                      <div className="p-4 rounded-xl bg-white border border-slate-200 flex items-center justify-between shadow-sm">
                        <div className="space-y-1">
                          <span className="font-bold text-sm text-slate-800 block">水果風味點心感 (提高依從性)</span>
                          <p className="text-xs text-slate-500">孩子主動搶著吃，實現每日不間斷足量補充</p>
                        </div>
                        <button 
                          onClick={() => setFlavorAcceptance(!flavorAcceptance)}
                          className={`w-14 h-8 rounded-full transition-colors relative flex items-center px-1 ${flavorAcceptance ? 'bg-emerald-500' : 'bg-slate-300'}`}
                        >
                          <div className={`w-6 h-6 rounded-full bg-white transition-transform ${flavorAcceptance ? 'translate-x-6' : 'translate-x-0'} shadow-md`} />
                        </button>
                      </div>
                    </div>

                    <div className="lg:col-span-4 bg-white rounded-2xl border border-slate-200 p-6 flex flex-col items-center justify-center min-h-[350px] shadow-sm">
                      <span className="text-xs text-slate-400 uppercase tracking-widest font-bold mb-4">全家人發育營養動態模擬</span>
                      <div className="relative w-48 h-48 flex items-center justify-center">
                        <svg viewBox="0 0 100 100" className="w-28 h-28 text-emerald-500">
                          <path d="M 35 25 C 45 12, 55 12, 65 25 C 60 40, 60 60, 65 75 C 55 88, 45 88, 35 75 C 40 60, 40 40, 35 25 Z" fill="none" stroke="currentColor" strokeWidth="2.5" />
                        </svg>
                      </div>
                    </div>

                    <div className="lg:col-span-3 flex flex-col justify-between gap-6">
                      <div className="space-y-6">
                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                          <span className="text-xs text-slate-500 block font-bold">黃金高吸收利用效率</span>
                          <div className="flex items-baseline gap-1 mt-1">
                            <span className="text-3xl font-black text-slate-800">{absorptionRate}</span>
                            <span className="text-xs text-emerald-600 font-extrabold">%</span>
                          </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                          <span className="text-xs text-slate-500 block font-bold">骨骼與牙齒發育支持率</span>
                          <div className="flex items-baseline gap-1 mt-1">
                            <span className="text-3xl font-black text-slate-800">{boneDensityRate}</span>
                            <span className="text-xs text-cyan-600 font-extrabold">%</span>
                          </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                          <span className="text-xs text-slate-500 block font-bold">消化道溫和舒適感</span>
                          <div className="flex items-baseline gap-1 mt-1">
                            <span className="text-3xl font-black text-slate-800">{comfortRatio}</span>
                            <span className="text-xs text-teal-600 font-extrabold">%</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* 教育訓練與常見問題解答 (Smart Sales Empowerment Center) */}
              <section id="academy" className="py-20 max-w-7xl mx-auto px-6 border-b border-slate-100">
                <div className="flex flex-col xl:flex-row items-start xl:items-end justify-between gap-6 mb-12">
                  <div className="space-y-4 max-w-2xl">
                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-50 border border-emerald-100 text-xs text-emerald-600 font-bold">
                      <i data-lucide="book-open" className="w-3.5 h-3.5"></i>
                      <span>活「粒」生活 經銷夥伴合規教育訓練指南</span>
                    </div>
                    <h2 className="text-3xl sm:text-4xl font-black text-slate-900">常見問題與服務對答拆招</h2>
                    <p className="text-slate-600 font-medium">本章節供服務人員與經銷通路內部教育訓練使用。請嚴格遵循衛福部核可之營養宣傳口徑與客戶溝通。</p>
                  </div>

                  <div className="flex flex-wrap gap-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                    <button onClick={() => setAcademyTab('manifesto')} className={`px-4 py-2.5 rounded-xl text-xs font-bold transition-all ${academyTab === 'manifesto' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-600'}`}>核心配方理念</button>
                    <button onClick={() => setAcademyTab('emotions')} className={`px-4 py-2.5 rounded-xl text-xs font-bold transition-all ${academyTab === 'emotions' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-600'}`}>分齡營養與關懷</button>
                    <button onClick={() => setAcademyTab('objections')} className={`px-4 py-2.5 rounded-xl text-xs font-bold transition-all ${academyTab === 'objections' ? 'bg-emerald-500 text-white shadow-sm' : 'text-slate-600'}`}>合規對答與心理拆招</button>
                  </div>
                </div>

                <div className="bg-white rounded-3xl border border-slate-200 p-6 sm:p-10 shadow-lg">
                  {academyTab === 'manifesto' && (
                    <div className="space-y-6">
                      <h3 className="text-2xl font-black text-slate-900">「美味與吸收並重，讓補鈣成為期待」</h3>
                      <p className="text-sm text-slate-700 leading-relaxed">
                        吃得再多，沒吸收也是徒勞。活「粒」生活秉持專業生技研發原則，將維生素 D3、維生素 K2 與多元複合鈣源融為一體，以優質的黃金高吸收配方，全面有助於維持骨骼與牙齒的正常發育與健康。
                      </p>
                    </div>
                  )}

                  {academyTab === 'emotions' && (
                    <div className="grid md:grid-cols-12 gap-8">
                      <div className="md:col-span-4 space-y-3">
                        <span className="text-xs text-cyan-600 font-bold uppercase block mb-4">精準分齡劑量與日常規劃指引</span>
                        <div className="p-4 bg-white border border-slate-200 rounded-xl">
                          <span className="text-xs font-bold text-slate-800 block">👶 幼童期 (6歲以下) —— 每日建議 1 粒</span>
                          <p className="text-xs text-slate-500 mt-1">隨餐咀嚼。基礎發育期，著重溫和呵護，補給骨骼與牙齒成長所需營養。</p>
                        </div>
                        <div className="p-4 bg-white border border-slate-200 rounded-xl">
                          <span className="text-xs font-bold text-slate-800 block">👦 黃金發育期 (6-18歲) —— 每日建議 2 粒</span>
                          <p className="text-xs text-slate-500 mt-1">早晚隨餐各 1 粒。關鍵生長時刻，海藻鈣全速輸出，鞏固成長發育的黃金密碼。</p>
                        </div>
                        <div className="p-4 bg-white border border-slate-200 rounded-xl">
                          <span className="text-xs font-bold text-slate-800 block">🧓 銀髮長輩與熟齡 —— 每日建議 2-3 粒</span>
                          <p className="text-xs text-slate-500 mt-1">隨餐服用。維持骨骼健康，有助於肌肉與神經的正常收縮，全面維持靈活動力。</p>
                        </div>
                      </div>

                      <div className="md:col-span-8 bg-slate-50 p-6 rounded-2xl border border-slate-200 flex flex-col justify-between">
                        <div className="space-y-4">
                                                    <ul className="list-disc pl-5 text-sm text-slate-700 space-y-2">
                            <li><strong>鈣：</strong> 有助於維持骨骼與牙齒的正常發育與健康。幫助血液正常的凝固功能。常與肌肉與神經的正常收縮及皮膚的健康。</li>
                            <li><strong>維生素D3：</strong> 增進鈣吸收。幫助骨骼與牙齒的生長發育。促進釋放骨鈣，以維持血鈣平衡。有助於維持神經、肌肉的正常生理。</li>
                            <li><strong>維生素K2：</strong> 有助血液正常的凝固功能。活化特殊蛋白質，將鈣質導向正確位置。</li>
                          </ul>
                        </div>
                      </div>
                    </div>
                  )}

                  {academyTab === 'objections' && (
                    <div className="space-y-6">
                      <div className="p-4 bg-slate-50 rounded-xl border border-slate-200 text-xs text-slate-600">
                        <strong className="text-slate-800 block text-sm mb-1">💰 經銷夥伴合規提醒</strong>
                        本產品定位於高端優質原材料直採與嚴格品管製造。在與消費者面談拆招時，請務必強調「100%安全安全、不脹氣、高依從性、通過嚴格第三方檢驗」的長期健康價值，切勿向消費者承諾任何暗示長高公分數、醫療療效之誇大詞彙。
                      </div>

                      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        {[
                          { id: 'o1', client: '「一粒幾十元，比普通碳酸鈣貴？」', response: '「市售碳酸鈣遇到胃酸容易釋放大量氣體，導致孩子肚子脹或不適。我們融合四大純淨優質鈣源，溫和不傷消化道。高吸收效率與高服用依從性，才是最高效的健康投資！」' },
                          { id: 'o2', client: '「保健品都是化學添加，不放心」', response: '「活『粒』生活採用愛爾蘭天然紅藻與優質乳源，符合 Clean Label 的潔淨製程標準，絕無化學溶劑殘留，給全家人最放心的營養守護。」' },
                          { id: 'o3', client: '「孩子很挑食，怕買了又不吃」', response: '「我們特別研發為清爽好嚼的牛奶風味，無傳統鈣片的怪異藥味，讓補充營養像每天的快樂點心時間，孩子主動愛吃，您不需天天操心！」' }
                        ].map(obj => (
                          <div key={obj.id} onClick={() => setFlippedObjection(flippedObjection === obj.id ? null : obj.id)} className="p-6 rounded-2xl border bg-white border-slate-200 hover:border-slate-300 cursor-pointer min-h-[150px] flex flex-col justify-between shadow-sm">
                            <div>
                              <span className="text-[10px] text-slate-400 font-bold block mb-1">常見提問</span>
                              <h4 className="text-sm font-bold text-slate-800 mb-2">{obj.client}</h4>
                            </div>
                            {flippedObjection === obj.id ? (
                              <div className="text-xs pt-2 border-t border-emerald-200 text-slate-700">
                                <strong>合規回覆：</strong>{obj.response}
                              </div>
                            ) : (
                              <span className="text-[11px] text-amber-600 font-bold flex items-center gap-1">👉 點擊查看合規對答法</span>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </section>

              {/* 四重複合系統與劑型考量 */}
              <section id="solutions" className="py-20 max-w-7xl mx-auto px-6 border-b border-slate-100">
                <div className="text-center max-w-3xl mx-auto space-y-4 mb-16">
                  <span className="text-xs font-extrabold tracking-widest text-emerald-600 uppercase">PRODUCT MATRIX</span>
                  <h2 className="text-3xl sm:text-4xl font-black text-slate-900">MitoActiveLife 四重晶體頂級複合配方</h2>
                </div>

                <div className="grid lg:grid-cols-12 gap-12 items-center bg-white p-8 sm:p-12 rounded-3xl border border-slate-200 shadow-md">
                  <div className="lg:col-span-7 space-y-8">
                    <span className="text-xs text-emerald-600 font-bold block uppercase">全方位高吸收網絡</span>
                    <h3 className="text-2xl font-black text-slate-900">「四大高端鈣源」完美融合</h3>
                    <p className="text-sm text-slate-600 leading-relaxed font-medium">告別單一鈣源釋放不均的弊端，透過先進包埋工藝將四大頂級鈣源網格化，實現完美的多層級、多梯隊緩釋吸收：</p>

                    <div className="space-y-4">
                      <div className="flex items-start gap-4">
                        <div className="w-8 h-8 rounded-lg bg-amber-100 flex items-center justify-center text-amber-600 font-bold shrink-0 text-xs shadow-sm">1</div>
                        <div>
                          <h4 className="text-sm font-bold text-slate-800">高純度溫和水解珍珠鈣 (極致微分子)</h4>
                          <p className="text-xs text-slate-500 mt-1">將頂級天然珍珠超導水解，微分子結構極易穿透，為身體提供最初步的優質氨基酸鈣營養網格。</p>
                        </div>
                      </div>

                      <div className="flex items-start gap-4">
                        <div className="w-8 h-8 rounded-lg bg-emerald-100 flex items-center justify-center text-emerald-600 font-bold shrink-0 text-xs shadow-sm">2</div>
                        <div>
                          <h4 className="text-sm font-bold text-slate-800">愛爾蘭天然紅藻海藻鈣 (高吸收蜂巢結構)</h4>
                          <p className="text-xs text-slate-500 mt-1">直採無污染大西洋天然紅藻萃取，具備獨特天然多孔蜂巢物理結構，高達 32% 的高吸收率，同時富含 72 種珍稀海洋微量礦物質。</p>
                        </div>
                      </div>

                      <div className="flex items-start gap-4">
                        <div className="w-8 h-8 rounded-lg bg-cyan-100 flex items-center justify-center text-cyan-600 font-bold shrink-0 text-xs shadow-sm">3</div>
                        <div>
                          <h4 className="text-sm font-bold text-slate-800">高親和原生态牛奶鈣 × 極溫和 L-乳酸鈣</h4>
                          <p className="text-xs text-slate-500 mt-1">提煉自純淨乳源的牛奶鈣具備極高的親和力，搭配溶解度極佳、對消化道零刺激的乳酸鈣，徹底杜絕傳統補鈣的負擔與不適。</p>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="lg:col-span-5 bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-200 space-y-6 shadow-inner">
                    <span className="text-xs text-slate-500 font-bold block uppercase">專為全家人定制 — 口嚼錠物理學</span>
                    <div className="space-y-4">
                      <div className="p-3.5 bg-white rounded-xl border border-slate-150 shadow-sm">
                        <span className="text-xs font-bold text-slate-800 block">口腔微吸收優勢</span>
                        <span className="text-[11px] text-slate-500 block mt-1">在細心咀嚼的過程中，部分微分子珍珠鈣與乳酸鈣便能直接被吸收，效率極佳。</span>
                      </div>
                      <div className="p-3.5 bg-white rounded-xl border border-slate-150 shadow-sm">
                        <span className="text-xs font-bold text-slate-800 block">快樂的健康體驗 (清爽水果風味)</span>
                        <span className="text-[11px] text-slate-500 block mt-1">酸甜可口的水果香氣與優質乳香結合，讓補鈣變成每日期待的快樂享受。</span>
                      </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* 團隊介紹 (Our Leadership) */}
              <section id="team" className="py-20 max-w-7xl mx-auto px-6 border-b border-slate-100">
                <div className="flex flex-col lg:flex-row lg:items-end justify-between gap-6 mb-16">
                  <div className="space-y-4 max-w-2xl">
                    <span className="text-xs font-extrabold tracking-widest text-emerald-600 uppercase">OUR LEADERSHIP</span>
                    <h2 className="text-3xl sm:text-4xl font-black text-slate-900">科研智慧與企業運營的完美結合</h2>
                  </div>
                </div>

                <div className="grid sm:grid-cols-2 gap-6 max-w-2xl">
                  {filteredLeaders.map(leader => (
                    <div key={leader.id} onClick={() => setSelectedLeader(leader)} className="bg-white rounded-2xl border border-slate-200 hover:border-emerald-200 overflow-hidden transition-all cursor-pointer flex flex-col justify-between shadow-sm">
                      <div className="p-5 space-y-2">
                        <h3 className="text-lg font-black text-slate-800">{leader.name}</h3>
                        <p className="text-xs text-slate-500 font-bold leading-tight">{leader.title}</p>
                        <p className="text-[11px] text-slate-500 line-clamp-2 mt-2 font-medium">{leader.experience}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              {/* 聯絡區/內部支援 (Contact Section) */}
              <section id="contact" className="py-20 max-w-7xl mx-auto px-6">
                <div className="grid lg:grid-cols-12 gap-12 bg-white p-8 sm:p-12 rounded-3xl border border-slate-200 shadow-lg">
                  <div className="lg:col-span-5 space-y-6">
                    <span className="text-xs font-extrabold tracking-widest text-emerald-600 uppercase">INTERNAL TRAINING SUPPORT</span>
                    <h2 className="text-3xl font-black text-slate-900">聯絡專家與獲取合規支援方案</h2>
                    <p className="text-slate-600 text-sm leading-relaxed">對純天然水解珍珠鈣、海藻鈣永續直採追溯，或對經銷通路的分級合規培訓有任何疑問？歡迎遞交內部支援諮詢申請。</p>
                  </div>

                  <div className="lg:col-span-7 bg-slate-50 p-6 sm:p-8 rounded-2xl border border-slate-200 shadow-inner">
                    <form className="space-y-4" onSubmit={(e) => e.preventDefault()}>
                      <div className="grid sm:grid-cols-2 gap-4">
                        <input type="text" placeholder="您的姓名" className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm" />
                        <input type="email" placeholder="內部聯絡電子郵件" className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm" />
                      </div>
                      <select className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-700">
                        <option>合規行銷與多元配方科學白皮書索取</option>
                        <option>珍珠鈣與無污染紅藻永續直採追溯證書</option>
                        <option>經銷通路合規話術培訓支援</option>
                      </select>
                      <button type="submit" className="w-full py-4 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-400 text-white text-sm font-bold shadow-lg">遞交內部合規培訓申請</button>
                    </form>
                  </div>
                </div>
              </section>

              {/* 頁腳 (Footer) */}
              <footer className="bg-white border-t border-slate-200/80 py-12">
                <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-3 gap-8">
                  <div className="space-y-4">
                    <span className="text-lg font-black text-slate-900">MitoActiveLife</span>
                    <p className="text-xs text-slate-500 leading-relaxed font-bold">MitoActiveLife 活「粒」生活 專業發育與健康補給系列。融合多元優質複合鈣源 × 關鍵導航因子 × 綠色環保與水果依從性。2026年6月修訂版。</p>
                  </div>
                  <div>
                    <h4 className="text-xs uppercase tracking-widest text-slate-400 font-extrabold mb-4">合法合規聲明與標準詞句</h4>
                    <p className="text-[10px] text-slate-500 leading-relaxed font-medium">
                      本網頁所有產品文案、教育訓練沙盒之編寫與規劃，均嚴格遵循衛生福利部食品藥物管理署公告之「食品廣告標示詞句認定基準」，僅作營養補充之用途宣傳，不涉及任何醫療、疾病預防與不實誇大。
                    </p>
                  </div>
                  <div>
                    <span className="text-xs text-slate-400 font-bold block">© 2026 MitoActiveLife Inc. All Rights Reserved.</span>
                  </div>
                </div>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
